<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Go Asteroids</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="bg-sumiink text-fujiwhite antialiiased">
    <header class="bg-waveblue1 shadow-lg">
      <div class="container mx-auto p-4 flex justify-between items-center">
        <h1 class="tet-2xl font-bold">Steven Hammon</h1>
        <nav>
          <ul class="flex space-x-4">
            <a href="./index.html#about" class="hover:text-fujigray">About</a>
          </ul>
        </nav>
      </div>
    </header>
    <article
      class="max-w-7xl mt-5 mx-auto border border-solid border-katanagray rounded-md p-5 text-center"
    >
      <h1 class="text-springblue text-5xl mt-5 mb-5">Asteroids</h1>
      <p class="text-s italic leading-[1.6] mb-5">
        <a
          href="https://github.com/s-hammon/go-asteroids"
          class="text-dragonred bold hover:underline"
          >Link</a
        >
        to project repo.
      </p>
      <p class="text-[1.2em] leading-[1.6] mb-5">
        Navigate your ship through the treacherous asteroid field, blast the
        space rocks to bits, and watch out for debris!
      </p>
      <p class="flex items-center justify-center">
        <iframe
          class="border border-solid border-katanagray rounded-md"
          src="_wasm.html"
          width="1280"
          height="720"
          allow="autoplay"
        >
        </iframe>
      </p>
      <div
        class="bg-waveblue1 mt-5 p-5 border border-solid border-katanagray rounded-md text-left"
      >
        <h2 class="text-2xl text-dragonred mt-0">Controls</h2>
        <ul class="list-none p-0 mt-1">
          <li class="mb-[10px]"><kbd>W</kbd> - Thrust</li>
          <li class="mb-[10px]"><kbd>A</kbd> - Rotate Left</li>
          <li class="mb-[10px]"><kbd>D</kbd> - Rotate Right</li>
          <li class="mb-[10px]"><kbd>Space</kbd> - Fire</li>
        </ul>
      </div>
    </article>
  </body>
</html>
